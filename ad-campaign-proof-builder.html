<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Campaign Proof Builder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,Helvetica,sans-serif;background:#0c0c1e;display:flex;height:100vh;overflow:hidden;}

/* ── EDITOR PANEL ── */
.editor{width:370px;min-width:370px;background:#111128;color:#dde;display:flex;flex-direction:column;overflow-y:auto;border-right:2px solid #1e1e40;}
.ed-header{background:linear-gradient(135deg,#3d6db3,#1e3d7a);padding:18px 16px 14px;color:#fff;}
.ed-header h1{font-size:16px;font-weight:700;margin-bottom:3px;letter-spacing:0.3px;}
.ed-header p{font-size:11px;opacity:.75;}

.dl-btn{display:block;width:calc(100% - 24px);margin:14px 12px 4px;padding:13px;background:linear-gradient(135deg,#00c896,#009b72);color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.4px;transition:all .2s;}
.dl-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,200,150,.35);}
.dl-btn:active{transform:translateY(0);}
.dl-btn:disabled{opacity:.6;cursor:default;transform:none;}

.ed-section{padding:14px 12px;border-bottom:1px solid #1e1e40;}
.ed-section h3{color:#4a88e0;font-size:10.5px;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:11px;padding-bottom:6px;border-bottom:1px solid #1e1e40;}
.fg{margin-bottom:9px;}
.fg label{display:block;font-size:10px;color:#778;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.fg input,.fg textarea,.fg select{width:100%;background:#181830;border:1px solid #252545;color:#dde;padding:7px 9px;border-radius:4px;font-size:12px;outline:none;font-family:Arial,sans-serif;}
.fg input:focus,.fg textarea:focus{border-color:#4a88e0;}
.fg textarea{resize:vertical;min-height:72px;line-height:1.5;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.tog{display:flex;align-items:center;gap:9px;padding:6px 0;}
.tog>span{font-size:12px;color:#aab;}
.sw{position:relative;display:inline-block;width:38px;height:21px;}
.sw input{display:none;}
.sl{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#333;border-radius:21px;transition:.3s;}
.sl:before{position:absolute;content:"";height:15px;width:15px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
input:checked+.sl{background:#4a88e0;}
input:checked+.sl:before{transform:translateX(17px);}
.ed-space{height:24px;}

/* ── PREVIEW WRAPPER ── */
.pv-wrap{flex:1;overflow-y:auto;background:#d8d8d8;padding:18px;}
.pv-label{text-align:center;color:#666;font-size:11px;margin-bottom:10px;letter-spacing:.3px;}

/* ── AD PREVIEW (classifieds replica) ── */
#preview{background:#fff;font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#333;max-width:920px;margin:0 auto;}

.ad-card{margin-bottom:16px;}

/* Blue header */
.adh{background:#4472C4;padding:10px 14px 0;}
.adh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.adh-posted{font-size:21px;font-weight:700;color:#fff;}
.adh-right{text-align:right;}
.adh-share{font-size:12px;color:#fff;margin-bottom:5px;}
.si-row{display:flex;gap:3px;justify-content:flex-end;}
.si{width:25px;height:25px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;border-radius:2px;cursor:pointer;flex-shrink:0;}
.si-fb{background:#3b5998;} .si-em{background:#888;} .si-tw{background:#1da1f2;}
.si-my{background:#000;font-size:8px;} .si-bl{background:#f57c00;} .si-su{background:#e05314;font-size:8px;}
.si-dg{background:#777;font-size:7.5px;} .si-sh{background:#33a852;}

/* Nav bar */
.ad-nav{background:#2d549e;padding:5px 14px;display:flex;gap:4px;}
.nav-btn{background:#1e3d7a;color:#fff;border:none;padding:4px 10px;font-size:11.5px;cursor:pointer;border-radius:2px;font-family:Arial,sans-serif;}

/* Content */
.ad-body{background:#fff;border:1px solid #ddd;border-top:none;padding:0;}

.title-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:start;padding:12px 14px 4px;}
.listing-title{color:#4472C4;font-size:17px;font-weight:normal;line-height:1.3;}
.center-heading{font-size:25px;font-weight:900;color:#111;text-align:center;white-space:nowrap;}

.two-col{display:grid;grid-template-columns:195px 1fr;gap:0;padding:10px 14px 14px;}

/* Left col */
.lcol{}
.lcol-section-title{color:#cc6600;font-size:13.5px;font-weight:700;margin-bottom:7px;}
.shr-row{display:flex;align-items:center;gap:3px;margin-bottom:11px;}
.shr-ico{width:21px;height:21px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;color:#fff;}
.shr-txt{font-size:11.5px;color:#333;}
.ad-num{color:#cc6600;font-size:13px;font-weight:700;margin-bottom:7px;}
.meta{font-size:12px;color:#555;margin-bottom:3px;}
.meta b{color:#333;}
.view-val{font-weight:700;color:#222;}

/* Badges */
.vbadge{display:inline-flex;align-items:center;gap:4px;background:#e8f5e9;color:#2e7d32;font-size:9.5px;font-weight:700;padding:3px 7px;border-radius:3px;border:1px solid #a5d6a7;margin-top:6px;}
.abadge{display:inline-flex;align-items:center;gap:3px;background:#fff3e0;color:#bf360c;font-size:9.5px;font-weight:700;padding:3px 7px;border-radius:3px;border:1px solid #ffcc80;margin-top:4px;margin-left:3px;}
.pdot{width:6px;height:6px;background:#4caf50;border-radius:50%;flex-shrink:0;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}

/* Right col */
.rcol{}
.ov-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;}
.ov-title{color:#cc6600;font-size:13.5px;font-weight:700;}
.ads-mode-btn{background:#1a2340;color:#fff;border:none;padding:5px 11px;font-size:11.5px;font-weight:700;cursor:pointer;border-radius:2px;font-family:Arial,sans-serif;white-space:nowrap;}
.resp-btn{background:#1a2340;color:#fff;border:none;padding:5px 11px;font-size:11.5px;cursor:pointer;border-radius:2px;font-family:Arial,sans-serif;float:right;margin-bottom:6px;}

.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px;font-size:12.5px;margin-bottom:10px;}
.ov-row{display:flex;gap:5px;}
.ov-lbl{color:#777;min-width:62px;flex-shrink:0;}
.ov-val{color:#333;}
.ov-link{color:#1a5276;text-decoration:underline;}

.desc-title{color:#cc6600;font-size:13.5px;font-weight:700;margin-bottom:7px;}
.desc-txt{font-size:12.5px;color:#333;line-height:1.75;white-space:pre-line;}
.desc-link{color:#1a5276;}

/* Performance stats */
.perf{background:#f0f5ff;border:1px solid #c8d8f5;border-radius:4px;padding:8px 12px;margin-top:11px;display:flex;gap:0;}
.perf-item{flex:1;text-align:center;border-right:1px solid #dce8ff;padding:0 8px;}
.perf-item:last-child{border-right:none;}
.pv{font-size:16px;font-weight:800;color:#2d549e;display:block;line-height:1.2;}
.pl{font-size:10px;color:#667;margin-top:1px;display:block;}

/* Score bar */
.score-wrap{margin-top:10px;background:#fafafa;border:1px solid #eee;border-radius:4px;padding:8px 12px;}
.score-row{display:flex;align-items:center;gap:8px;font-size:11px;color:#555;margin-bottom:4px;}
.score-bar{flex:1;height:7px;background:#e0e0e0;border-radius:4px;overflow:hidden;}
.score-fill{height:100%;background:linear-gradient(90deg,#4472C4,#00c896);border-radius:4px;}
.score-num{font-weight:700;color:#2d549e;min-width:28px;text-align:right;}

/* Proof footer */
.proof-footer{background:#f8f8f8;border-top:2px solid #4472C4;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;font-size:10.5px;color:#888;}
.pf-left{display:flex;align-items:center;gap:6px;}
.pf-dot{width:8px;height:8px;background:#4caf50;border-radius:50%;animation:blink 1.4s infinite;}
.pf-right{font-size:10px;color:#aaa;}
</style>
</head>
<body>

<!-- EDITOR PANEL -->
<div class="editor">
  <div class="ed-header">
    <h1>📋 Ad Campaign Proof Builder</h1>
    <p>Edit fields → Preview updates live → Download HD PNG</p>
  </div>

  <button class="dl-btn" id="dlBtn" onclick="downloadProof()">⬇ Download as HD Image</button>

  <!-- GLOBAL -->
  <div class="ed-section">
    <h3>Global Settings</h3>
    <div class="fg"><label>Contact / Streamer Name</label>
      <input id="g-contact" value="NovaRush" oninput="rp()"></div>
    <div class="fr">
      <div class="fg"><label>City</label>
        <input id="g-city" value="United States" oninput="rp()"></div>

  <div class="ed-section">

      <div class="fg"><label>Created Date</label>
        <input id="a1-created" value="01 June, 2026" oninput="rp()"></div>
      <div class="fg"><label>Expires Date</label>
        <input id="a1-expires" value="30 June, 2026" oninput="rp()"></div>
    </div>
    <div class="fr">
      <div class="fg"><label>Viewed (times)</label>
        <input type="number" id="a1-views" value="148" oninput="rp()"></div>
      <div class="fg"><label>ADS MODE Label</label>
        <input id="a1-mode" value="Rapid Growth" oninput="rp()"></div>
    </div>
    <div class="fg"><label>Posted In</label>
      <input id="a1-posted" value="United States and some other traffic locations" oninput="rp()"></div>
    <div class="fg"><label>Description</label>
      <textarea id="a1-desc" rows="7" oninput="rp()">🎮 NovaRush – Road to Partner!

    </div>

      <div class="fg"><label>Platforms</label><input id="a1-plat" value="3 Platforms" oninput="rp()"></div>

      <input type="number" id="a1-score" value="87" min="0" max="100" oninput="rp()"></div>

  <!-- AD 2 -->
  <div class="ed-section">
    <div class="tog">
      <label class="sw"><input type="checkbox" id="sw-ad2" checked onchange="rp()"><span class="sl"></span></label>
      <span><b>Enable Second Ad</b></span>
    </div>
    <h3 style="margin-top:8px;">Ad #2 Details</h3>
    <div class="fg"><label>Listing Title</label>
      <input id="a2-title" value="Join the Adventure: Epic MultiVersus Gameplay Live – Don't Miss the Action!" oninput="rp()"></div>

      <div class="fg"><label>Ad Number</label>
        <input id="a2-num" value="1037188192" oninput="rp()"></div>
      <div class="fg"><label>Price</label>
        <input id="a2-price" value="$50" oninput="rp()"></div>
    </div>
    <div class="fr">
      <div class="fg"><label>Created Date</label>
        <input id="a2-created" value="01 June, 2026" oninput="rp()"></div>

        <input id="a2-expires" value="30 June, 2026" oninput="rp()"></div>

    <div class="fr">
      <div class="fg"><label>Viewed (times)</label>
        <input type="number" id="a2-views" value="126" oninput="rp()"></div>

        <input id="a2-zip" value="33401" oninput="rp()"></div>

    <div class="fg"><label>Posted In</label>

      <textarea id="a2-desc" rows="7" oninput="rp()">MultiVersus Gameplay Live Now!!!

    </div>
    <div class="fr">
      <div class="fg"><label>Impressions</label><input id="a2-imp" value="983" oninput="rp()"></div>
      <div class="fg"><label>CTR</label><input id="a2-ctr" value="2.8%" oninput="rp()"></div>
    </div>
    <div class="fr">
      <div class="fg"><label>Unique Reach</label><input id="a2-reach" value="741" oninput="rp()"></div>
      <div class="fg"><label>Platforms</label><input id="a2-plat" value="2 Platforms" oninput="rp()"></div>
    </div>
    <div class="fg"><label>Campaign Score (0-100)</label>
      <input type="number" id="a2-score" value="79" min="0" max="100" oninput="rp()"></div>
  </div>

  <div class="ed-space"></div>
</div>

<!-- PREVIEW PANEL -->
<div class="pv-wrap">
  <div class="pv-label">📄 LIVE PREVIEW — Edits update instantly · HD export available</div>
  <div id="preview"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const v = id => $(id)?.value ?? '';
const cb = id => $(id)?.checked ?? false;

function socialIcons(){
  return `<div class="si-row">
    <div class="si si-fb">f</div>
    <div class="si si-em">✉</div>
    <div class="si si-tw">t</div>
    <div class="si si-my">my</div>
    <div class="si si-bl">B</div>
    <div class="si si-su">SU</div>
    <div class="si si-dg">digg</div>
    <div class="si si-sh">◁</div>
  </div>`;
}

function fmtDesc(txt){
  return txt.split('\n').map(l =>
    l.replace(/(https?:\/\/\S+)/g,'<a class="desc-link" href="#">$1</a>')
  ).join('<br>');
}

function adCard(c){
  const showPerf  = cb('sw-perf');
  const showBadge = cb('sw-badge');
  const showScore = cb('sw-score');

  const badgesHtml = showBadge ? `
    <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:3px;">
      <span class="vbadge">✓ VERIFIED CAMPAIGN</span>
      <span class="abadge"><span class="pdot"></span> LIVE &amp; ACTIVE</span>
    </div>` : '';

  const perfHtml = showPerf ? `
    <div class="perf">
      <div class="perf-item"><span class="pv">${c.imp}</span><span class="pl">Impressions</span></div>
      <div class="perf-item"><span class="pv">${c.ctr}</span><span class="pl">Click-Through Rate</span></div>
      <div class="perf-item"><span class="pv">${c.reach}</span><span class="pl">Unique Reach</span></div>
      <div class="perf-item"><span class="pv">${c.plat}</span><span class="pl">Distribution</span></div>
    </div>` : '';

  const scoreVal = Math.min(100, Math.max(0, parseInt(c.score)||0));
  const scoreHtml = showScore ? `
    <div class="score-wrap">
      <div class="score-row">
        <span>Campaign Performance Score</span>
        <div class="score-bar"><div class="score-fill" style="width:${scoreVal}%;"></div></div>
        <span class="score-num">${scoreVal}/100</span>
      </div>
    </div>` : '';

  const respBtn = c.respond ? `<button class="resp-btn">Respond to this Ad</button>` : '';
  const zipRow  = c.zip
    ? `<div class="ov-row"><span class="ov-lbl">Zip:</span><span class="ov-val">${c.zip}</span></div>`
    : `<div class="ov-row"><span class="ov-lbl">Zip:</span><span class="ov-val"></span></div>`;

  return `
<div class="ad-card">
  <div class="adh">
    <div class="adh-top">
      <div class="adh-posted">Your ad has been posted.</div>
      <div class="adh-right">
        <div class="adh-share">Share your ad for more visibility!</div>
        ${socialIcons()}
      </div>
    </div>
  </div>
  <div class="ad-nav">
    <button class="nav-btn">Post another ad</button>
    <button class="nav-btn">Edit this ad</button>
    <button class="nav-btn">Help page</button>
    <button class="nav-btn">Your stuff</button>
  </div>
  <div class="ad-body">
    <div class="title-row">
      <div class="listing-title">${c.title}</div>
      <div class="center-heading">Ads Campaign</div>
      <div></div>
    </div>
    <div class="two-col">
      <!-- LEFT -->
      <div class="lcol">
        <div class="lcol-section-title">Share &amp; Like</div>
        <div class="shr-row">
          <div class="shr-ico si-em">✉</div>
          <div class="shr-ico si-fb">f</div>
          <div class="shr-ico si-tw">t</div>
          <span class="shr-txt" style="color:#5cb85c;">◁ ShareThis</span>
        </div>
        <div class="ad-num">Ad #${c.num}</div>
        <div class="meta">Created: <b>${c.created}</b></div>
        <div class="meta">Expires: <b>${c.expires}</b></div>
        <div class="meta">Viewed: <b class="view-val" id="vv-${c.id}">${c.views}</b> times</div>
        ${badgesHtml}
      </div>
      <!-- RIGHT -->
      <div class="rcol">
        ${respBtn}
        <div class="ov-header">
          <div class="ov-title">Overview</div>
          <button class="ads-mode-btn">ADS MODE: ${c.mode}</button>
        </div>
        <div class="ov-grid">
          <div class="ov-row"><span class="ov-lbl">Contact:</span><span class="ov-val">${c.contact}</span></div>
          <div class="ov-row"><span class="ov-lbl">City:</span><span class="ov-val">${c.city}</span></div>
          ${zipRow}
          <div class="ov-row"><span class="ov-lbl">Price:</span><span class="ov-val">${c.price}</span></div>
          <div class="ov-row" style="grid-column:1/-1;">
            <span class="ov-lbl">Posted in:</span>
            <span class="ov-link">${c.posted}</span>
          </div>
        </div>
        <div class="desc-title">Description</div>
        <div class="desc-txt">${fmtDesc(c.desc)}</div>
        ${perfHtml}
        ${scoreHtml}
      </div>
    </div>
  </div>
</div>`;
}

function rp(){
  const contact = v('g-contact');
  const city    = v('g-city');
  const zip     = v('g-zip');
  const now     = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

  const a1 = adCard({
    id:'a1', respond:false,
    title:   v('a1-title'),
    num:     v('a1-num'),
    price:   v('a1-price'),
    created: v('a1-created'),
    expires: v('a1-expires'),
    views:   v('a1-views'),
    mode:    v('a1-mode') || 'Standard',
    posted:  v('a1-posted'),
    desc:    v('a1-desc'),
    imp:     v('a1-imp'),
    ctr:     v('a1-ctr'),
    reach:   v('a1-reach'),
    plat:    v('a1-plat'),
    score:   v('a1-score'),
    contact, city, zip
  });

  let a2 = '';
  if(cb('sw-ad2')){
    a2 = adCard({
      id:'a2', respond:true,
      title:   v('a2-title'),
      num:     v('a2-num'),
      price:   v('a2-price'),
      created: v('a2-created'),
      expires: v('a2-expires'),
      views:   v('a2-views'),
      mode:    'Standard',
      posted:  v('a2-posted'),
      desc:    v('a2-desc'),
      imp:     v('a2-imp'),
      ctr:     v('a2-ctr'),
      reach:   v('a2-reach'),
      plat:    v('a2-plat'),
      score:   v('a2-score'),
      contact, city,
      zip:     v('a2-zip')
    });
  }

  const footer = `
<div class="proof-footer">
  <div class="pf-left">
    <span class="pf-dot"></span>
    <span>✅ Campaign Successfully Delivered &nbsp;|&nbsp; Proof generated: ${now}</span>
  </div>
  <div class="pf-right">Ad Campaign Manager · streamforge.io</div>
</div>`;

  $('preview').innerHTML = a1 + a2 + footer;
  startLiveCounters();
}

// Animate view counters every 4s
function startLiveCounters(){
  clearInterval(window._counterTimer);
  window._counterTimer = setInterval(()=>{
    ['vv-a1','vv-a2'].forEach(id=>{
      const el = $(id);
      if(!el) return;
      if(Math.random() > 0.55){
        const n = parseInt(el.textContent)||0;
        el.textContent = n + 1;
        el.style.color = '#2e7d32';
        el.style.transition = 'color .5s';
        setTimeout(()=>{ el.style.color='#222'; },700);
      }
    });
  }, 4200);
}

async function downloadProof(){
  const btn = $('dlBtn');
  btn.textContent = '⏳ Rendering…';
  btn.disabled = true;
  try{
    const canvas = await html2canvas($('preview'),{
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false,
      imageTimeout: 0
    });
    const a = document.createElement('a');
    a.download = `campaign-proof-${Date.now()}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
    btn.textContent = '✅ Downloaded!';
    setTimeout(()=>{ btn.textContent='⬇ Download as HD Image'; btn.disabled=false; },2200);
  }catch(e){
    btn.textContent = '❌ Error — Try again';
    btn.disabled = false;
    console.error(e);
  }
}

// Init
rp();
</script>
