<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TemmyPros — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050507;--glass:rgba(255,255,255,.045);--glass-border:rgba(255,255,255,.09);
    --violet:#8b5cf6;--blue:#4f7fff;--signal:#19e8c5;--text:#f3f1f8;--muted:#9b96ad;--dim:#5b5668;
    --err:#ff6868;--r:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    min-height:100vh;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
    display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;
  }
  .bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(620px 620px at 20% 15%, rgba(139,92,246,.18), transparent 60%),
               radial-gradient(680px 680px at 85% 85%, rgba(79,127,255,.14), transparent 60%);
    animation:glowShift 9s ease-in-out infinite alternate;}
  @keyframes glowShift{
    0%{background-position:0% 0%,0% 0%;}
    100%{background-position:6% 4%,-6% -4%;}
  }
  #bg-canvas{position:fixed;inset:0;z-index:0;opacity:.5;}
  #cursor-glow{
    position:fixed;width:380px;height:380px;border-radius:50%;
    background:radial-gradient(circle, rgba(139,92,246,.10), transparent 70%);
    pointer-events:none;z-index:0;transform:translate(-50%,-50%);
  }

  .panel{
    position:relative;z-index:1;width:100%;max-width:380px;
    background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r);
    backdrop-filter:blur(18px);padding:38px 32px 32px;
    box-shadow:0 30px 70px -30px rgba(0,0,0,.7);
    opacity:0;animation:in .6s ease forwards;
  }
  @keyframes in{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

  .brand{display:flex;align-items:center;gap:10px;font-family:'Sora',sans-serif;font-weight:700;font-size:17px;margin-bottom:30px;}
  .brand-mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--violet),var(--blue));
    display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:13px;font-weight:800;
    box-shadow:0 0 20px rgba(139,92,246,.5);}

  h1{font-family:'Sora',sans-serif;font-size:22px;font-weight:700;letter-spacing:-.01em;}
  .sub{color:var(--muted);font-size:13.5px;margin-top:6px;margin-bottom:26px;line-height:1.5;}

  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:7px;letter-spacing:.2px;}
  .field{margin-bottom:18px;}
  input{
    width:100%;padding:13px 14px;border-radius:11px;background:rgba(255,255,255,.04);
    border:1px solid var(--glass-border);color:var(--text);font-family:'Inter',sans-serif;font-size:14.5px;
    outline:none;transition:border-color .2s,background .2s;
  }
  input:focus{border-color:var(--violet);background:rgba(255,255,255,.06);}
  input::placeholder{color:var(--dim);}

  .otp-row{display:flex;gap:10px;margin-bottom:6px;}
  .otp-row input{
    text-align:center;font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;
    letter-spacing:1px;padding:13px 0;
  }

  .error{
    display:none;align-items:center;gap:8px;font-size:12.5px;color:var(--err);
    background:rgba(255,104,104,.08);border:1px solid rgba(255,104,104,.25);
    padding:9px 12px;border-radius:10px;margin-bottom:16px;
  }
  .error.show{display:flex;}

  button.submit{
    width:100%;padding:14px;border-radius:11px;border:none;font-weight:600;font-size:14.5px;
    background:linear-gradient(120deg,var(--violet),var(--blue));color:#fff;cursor:pointer;
    box-shadow:0 10px 26px -10px rgba(139,92,246,.6);transition:transform .2s, box-shadow .2s;
    margin-top:4px;
  }
  button.submit:hover{transform:translateY(-1px);box-shadow:0 14px 30px -10px rgba(139,92,246,.7);}
  button.submit:active{transform:translateY(0);}

  .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:12.5px;cursor:pointer;
    margin-top:18px;transition:color .2s;background:none;border:none;font-family:'Inter',sans-serif;}
  .back:hover{color:var(--text);}

  .otp-note{font-size:12px;color:var(--dim);margin-top:14px;line-height:1.6;text-align:center;}

  .success{display:none;text-align:center;padding:10px 0 4px;}
  .success.show{display:block;}
  .success .check{
    width:54px;height:54px;border-radius:50%;margin:0 auto 18px;
    background:rgba(25,232,197,.12);border:1px solid rgba(25,232,197,.35);
    display:flex;align-items:center;justify-content:center;
  }
  .success h2{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px;}
  .success p{color:var(--muted);font-size:13px;}

  .step{display:none;}
  .step.active{display:block;}

  @media (prefers-reduced-motion: reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="bg-glow"></div>
<div id="cursor-glow"></div>

<div class="panel">
  <div class="brand"><span class="brand-mark">TP</span> TemmyPros</div>

  <!-- STEP 1: credentials -->
  <div class="step active" id="step-creds">
    <h1>Sign in</h1>
    <p class="sub">Enter your credentials to access the dashboard.</p>
    <div class="error" id="creds-error">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="10"/><path d="M12 8v5"/><path d="M12 16h.01"/></svg>
      <span id="creds-error-text">Incorrect username or password.</span>
    </div>
    <form id="creds-form">
      <div class="field">
        <label for="username">Username or email</label>
        <input id="username" type="text" autocomplete="username" placeholder="" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••••••" required>
      </div>
      <button type="submit" class="submit">Continue</button>
    </form>
  </div>

  <!-- STEP 2: OTP -->
  <div class="step" id="step-otp">
    <h1>Verify your identity</h1>
    <p class="sub">Enter the 4-digit code sent to confirm it's you.</p>
    <div class="error" id="otp-error">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="10"/><path d="M12 8v5"/><path d="M12 16h.01"/></svg>
      <span>Incorrect code. Try again.</span>
    </div>
    <form id="otp-form">
      <div class="otp-row">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="otp-digit" required>
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="otp-digit" required>
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="otp-digit" required>
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="otp-digit" required>
      </div>
      <p class="otp-note">Code expires in 5 minutes.</p>
      <button type="submit" class="submit">Verify</button>
    </form>
    <button class="back" id="back-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      Back
    </button>
  </div>

  <!-- STEP 3: success -->
  <div class="step" id="step-success">
    <div class="success show">
      <div class="check">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#19e8c5" stroke-width="2.4"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <h2>You're verified</h2>
      <p>Redirecting you to the dashboard…</p>
    </div>
  </div>
</div>

<script>
  const VALID_USERS = ['moneymustbemade', 'moneymustbemade@temail.com'];
  const VALID_PASSWORD = 'mmm(makemoney)';
  const VALID_OTP = '1020';
  const REDIRECT_URL = 'dashboard.html';

  const stepCreds = document.getElementById('step-creds');
  const stepOtp = document.getElementById('step-otp');
  const stepSuccess = document.getElementById('step-success');

  function showStep(step){
    [stepCreds, stepOtp, stepSuccess].forEach(s => s.classList.remove('active'));
    step.classList.add('active');
  }

  document.getElementById('creds-form').addEventListener('submit', e => {
    e.preventDefault();
    const u = document.getElementById('username').value.trim().toLowerCase();
    const p = document.getElementById('password').value;
    const errBox = document.getElementById('creds-error');
    const errText = document.getElementById('creds-error-text');

    if (!u || !p){
      errText.textContent = 'Username and password are both required.';
      errBox.classList.add('show');
      return;
    }
    if (VALID_USERS.includes(u) && p === VALID_PASSWORD){
      errBox.classList.remove('show');
      showStep(stepOtp);
      document.querySelector('.otp-digit').focus();
    } else {
      errText.textContent = 'Incorrect username or password.';
      errBox.classList.add('show');
    }
  });

  // OTP digit auto-advance
  const digits = document.querySelectorAll('.otp-digit');
  digits.forEach((d, i) => {
    d.addEventListener('input', () => {
      d.value = d.value.replace(/[^0-9]/g, '');
      if (d.value && digits[i+1]) digits[i+1].focus();
    });
    d.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !d.value && digits[i-1]) digits[i-1].focus();
    });
  });

  document.getElementById('otp-form').addEventListener('submit', e => {
    e.preventDefault();
    const code = Array.from(digits).map(d => d.value).join('');
    const errBox = document.getElementById('otp-error');

    if (code === VALID_OTP){
      errBox.classList.remove('show');
      showStep(stepSuccess);
      setTimeout(() => { window.location.href = REDIRECT_URL; }, 1400);
    } else {
      errBox.classList.add('show');
      digits.forEach(d => d.value = '');
      digits[0].focus();
    }
  });

  document.getElementById('back-btn').addEventListener('click', () => {
    document.getElementById('otp-error').classList.remove('show');
    digits.forEach(d => d.value = '');
    showStep(stepCreds);
  });

  // cursor glow
  const glow = document.getElementById('cursor-glow');
  window.addEventListener('mousemove', e => {
    glow.style.left = e.clientX + 'px';
    glow.style.top = e.clientY + 'px';
  });

  // particle background
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  function initParticles(){
    particles = [];
    const count = Math.min(60, Math.floor(window.innerWidth / 24));
    for (let i = 0; i < count; i++){
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.6 + .4,
        vx: (Math.random() - .5) * .18,
        vy: (Math.random() - .5) * .18,
        a: Math.random() * .5 + .15
      });
    }
  }
  initParticles();
  window.addEventListener('resize', initParticles);
  function loop(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(160,140,255,${p.a})`;
      ctx.fill();
    });
    requestAnimationFrame(loop);
  }
  if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) loop();
</script>
</body>
</html>
